<div class="tarjeta-container">
  <h2>Tarjeta de Presentación</h2>
  <div class="info">
    <p><strong>Nombre:</strong> {{ nombre }}</p>
    <p><strong>Edad:</strong> {{ edad }} años</p>
  </div>
  
  <div class="interaccion">
    <p>Likes: {{ likes }}</p>
    <button (click)="darLike()">Me gusta</button>
  </div>
</div>
